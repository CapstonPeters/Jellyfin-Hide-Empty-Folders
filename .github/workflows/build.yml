name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish artifact
        run: |
          mkdir -p publish
          cp bin/Release/net9.0/Jellyfin.Plugin.HideEmptyFolders.dll publish/ 2>/dev/null || true
          cp bin/Release/net9.0/Jellyfin.Plugin.HideEmptyFolders.pdb publish/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.HideEmptyFolders
          path: publish/
