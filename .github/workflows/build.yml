name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Create plugin ZIP
        run: |
          mkdir -p publish
          cp bin/Release/net9.0/Jellyfin.Plugin.HideEmptyFolders.dll publish/
          cd publish
          zip ../Jellyfin.Plugin.HideEmptyFolders.zip Jellyfin.Plugin.HideEmptyFolders.dll
          echo "CHECKSUM=$(md5sum ../Jellyfin.Plugin.HideEmptyFolders.zip | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.HideEmptyFolders
          path: publish/

      - name: Upload release asset (tagged pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.HideEmptyFolders.zip
          generate_release_notes: true
